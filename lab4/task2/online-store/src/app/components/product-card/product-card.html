<div class="card">
    <img [src]="product.image" alt="{{ product.name }}" />

    <h3>{{ product.name }}</h3>
    <p>{{ product.description }}</p>

    <p><strong>Price:</strong> {{ product.price }} ₸</p>
    <p><strong>Rating:</strong> {{ product.rating }}</p>

    <a [href]="product.link" target="_blank">
        View on Kaspi
    </a>
</div>
