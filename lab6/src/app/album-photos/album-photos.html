<h2>Album Photos</h2>

<div *ngIf="photos$ | async as photos">

  <div class="photo-grid">
    <div class="photo-card" *ngFor="let photo of photos">
      <img [src]="photo.thumbnailUrl" />
      <p class="photo-title">
        {{ photo.title }}
      </p>
    </div>
  </div>

  <button routerLink="/albums">
    Back to Albums
  </button>

  <button
  class="back-button"
  [routerLink]="['/albums', photos[0]?.albumId]">
  Back
</button>

</div>
